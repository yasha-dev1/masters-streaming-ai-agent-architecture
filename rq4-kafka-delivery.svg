<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 1240 820" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-fast" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-batch" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-feedback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background (forces light theme regardless of GitHub dark mode) -->
  <rect x="-20" y="-20" width="1240" height="820" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">RQ4 — (event, context) delivery over Kafka</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#64748b">Two event lanes partitioned by entity key · one consumer group per agent role · feedback closes the RQ2 bandit loop</text>

  <!-- Producer: Context Engine -->
  <g transform="translate(40, 110)">
    <rect width="180" height="200" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">Context Engine</text>
    <text x="90" y="44" text-anchor="middle" font-size="11" fill="#6b21a8" font-style="italic">producer</text>
    <line x1="20" y1="58" x2="160" y2="58" stroke="#e9d5ff"/>
    <text x="90" y="80" text-anchor="middle" font-size="11" fill="#475569">enriches event from</text>
    <text x="90" y="96" text-anchor="middle" font-size="11" fill="#475569">Graphiti, computes</text>
    <text x="90" y="112" text-anchor="middle" font-size="11" fill="#475569">context, emits envelope</text>
    <line x1="20" y1="128" x2="160" y2="128" stroke="#e9d5ff"/>
    <text x="90" y="150" text-anchor="middle" font-size="10" fill="#64748b">partition key =</text>
    <text x="90" y="168" text-anchor="middle" font-size="10" fill="#64748b" font-family="monospace">event.subject</text>
    <text x="90" y="186" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">(customer:42, order:9931, …)</text>
  </g>

  <!-- Producer → Kafka arrow -->
  <line x1="220" y1="210" x2="280" y2="210" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Kafka cluster boundary -->
  <rect x="290" y="80" width="600" height="440" rx="14" fill="#fafbff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="310" y="102" font-size="13" font-weight="600" fill="#6366f1">Kafka cluster</text>
  <text x="310" y="118" font-size="10" fill="#6366f1" font-style="italic">topics partitioned by entity key — Kafka hashes the key to a single partition</text>

  <!-- Topic: cms.events.fast.v1 -->
  <g transform="translate(310, 130)">
    <rect width="560" height="84" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#065f46">cms.events.fast.v1</text>
    <text x="540" y="24" text-anchor="end" font-size="10" fill="#065f46" font-style="italic">50 partitions · 24 h retention · urgent (event, context)</text>
    <g transform="translate(20, 38)">
      <rect width="520" height="34" rx="4" fill="#ffffff" stroke="#a7f3d0"/>
      <g font-size="9" font-family="monospace" fill="#065f46" text-anchor="middle">
        <rect x="6" y="5" width="36" height="24" rx="3" fill="#d1fae5" stroke="#10b981"/>
        <text x="24" y="22">P0</text>
        <rect x="48" y="5" width="36" height="24" rx="3" fill="#10b981" stroke="#065f46" stroke-width="1.5"/>
        <text x="66" y="22" fill="#ffffff" font-weight="700">P1</text>
        <rect x="90" y="5" width="36" height="24" rx="3" fill="#d1fae5" stroke="#10b981"/>
        <text x="108" y="22">P2</text>
        <rect x="132" y="5" width="36" height="24" rx="3" fill="#d1fae5" stroke="#10b981"/>
        <text x="150" y="22">P3</text>
        <text x="280" y="22" font-family="system-ui" fill="#10b981">·  ·  ·</text>
        <rect x="466" y="5" width="48" height="24" rx="3" fill="#d1fae5" stroke="#10b981"/>
        <text x="490" y="22">P49</text>
      </g>
    </g>
  </g>

  <!-- Topic: cms.events.batch.v1 -->
  <g transform="translate(310, 230)">
    <rect width="560" height="84" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#9a3412">cms.events.batch.v1</text>
    <text x="540" y="24" text-anchor="end" font-size="10" fill="#9a3412" font-style="italic">30 partitions · 7 d retention · windowed Context Units</text>
    <g transform="translate(20, 38)">
      <rect width="520" height="34" rx="4" fill="#ffffff" stroke="#fed7aa"/>
      <g font-size="9" font-family="monospace" fill="#9a3412" text-anchor="middle">
        <rect x="6" y="5" width="36" height="24" rx="3" fill="#ffedd5" stroke="#f97316"/>
        <text x="24" y="22">P0</text>
        <rect x="48" y="5" width="36" height="24" rx="3" fill="#ffedd5" stroke="#f97316"/>
        <text x="66" y="22">P1</text>
        <rect x="90" y="5" width="36" height="24" rx="3" fill="#ffedd5" stroke="#f97316"/>
        <text x="108" y="22">P2</text>
        <rect x="132" y="5" width="36" height="24" rx="3" fill="#ffedd5" stroke="#f97316"/>
        <text x="150" y="22">P3</text>
        <text x="280" y="22" font-family="system-ui" fill="#f97316">·  ·  ·</text>
        <rect x="466" y="5" width="48" height="24" rx="3" fill="#ffedd5" stroke="#f97316"/>
        <text x="490" y="22">P29</text>
      </g>
    </g>
  </g>

  <!-- Topic: cms.feedback.v1 -->
  <g transform="translate(310, 330)">
    <rect width="560" height="84" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="20" y="24" font-size="13" font-weight="600" fill="#0369a1">cms.feedback.v1</text>
    <text x="540" y="24" text-anchor="end" font-size="10" fill="#0369a1" font-style="italic">10 partitions · routing_feedback verdicts → RQ2 bandit</text>
    <g transform="translate(20, 38)">
      <rect width="520" height="34" rx="4" fill="#ffffff" stroke="#bae6fd"/>
      <g font-size="9" font-family="monospace" fill="#0369a1" text-anchor="middle">
        <rect x="6" y="5" width="36" height="24" rx="3" fill="#e0f2fe" stroke="#0ea5e9"/>
        <text x="24" y="22">P0</text>
        <rect x="48" y="5" width="36" height="24" rx="3" fill="#e0f2fe" stroke="#0ea5e9"/>
        <text x="66" y="22">P1</text>
        <text x="220" y="22" font-family="system-ui" fill="#0ea5e9">·  ·  ·</text>
        <rect x="466" y="5" width="48" height="24" rx="3" fill="#e0f2fe" stroke="#0ea5e9"/>
        <text x="490" y="22">P9</text>
      </g>
    </g>
  </g>

  <!-- DLQ note inside the cluster -->
  <text x="600" y="498" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">+ &lt;group&gt;.dlq per role for envelopes failing N retries (idempotency key = CloudEvent (source, id))</text>

  <!-- Annotation: routing of customer:42 to P1 on the fast topic (compact, fits within the gap) -->
  <text x="255" y="196" text-anchor="middle" font-size="9" fill="#10b981" font-style="italic">customer:42</text>
  <text x="255" y="230" text-anchor="middle" font-size="9" fill="#10b981" font-style="italic">→ P1 (fast)</text>

  <!-- Consumer groups column -->
  <g transform="translate(910, 100)">
    <text x="145" y="14" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Agent consumer groups</text>
    <text x="145" y="30" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">stateless replicas · cooperative-sticky</text>

    <!-- triage group -->
    <g transform="translate(0, 50)">
      <rect width="290" height="100" rx="10" fill="#f8fafc" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="22" font-size="12" font-weight="600" fill="#065f46">cms.agents.triage</text>
      <text x="276" y="22" text-anchor="end" font-size="10" fill="#065f46" font-style="italic">consumes fast</text>
      <line x1="14" y1="32" x2="276" y2="32" stroke="#a7f3d0"/>
      <g font-size="10" fill="#334155">
        <rect x="14" y="42" width="80" height="44" rx="6" fill="#ffffff" stroke="#94a3b8"/>
        <text x="54" y="60" text-anchor="middle" font-size="10" font-weight="600">R1</text>
        <text x="54" y="76" text-anchor="middle" font-size="9" fill="#64748b">P0..15</text>

        <rect x="104" y="42" width="80" height="44" rx="6" fill="#ffffff" stroke="#94a3b8"/>
        <text x="144" y="60" text-anchor="middle" font-size="10" font-weight="600">R2</text>
        <text x="144" y="76" text-anchor="middle" font-size="9" fill="#64748b">P16..32</text>

        <rect x="194" y="42" width="80" height="44" rx="6" fill="#ffffff" stroke="#94a3b8"/>
        <text x="234" y="60" text-anchor="middle" font-size="10" font-weight="600">R3</text>
        <text x="234" y="76" text-anchor="middle" font-size="9" fill="#64748b">P33..49</text>
      </g>
    </g>

    <!-- compliance group -->
    <g transform="translate(0, 165)">
      <rect width="290" height="80" rx="10" fill="#f8fafc" stroke="#9a3412" stroke-width="1.5"/>
      <text x="14" y="22" font-size="12" font-weight="600" fill="#9a3412">cms.agents.compliance</text>
      <text x="276" y="22" text-anchor="end" font-size="10" fill="#9a3412" font-style="italic">fast + batch</text>
      <line x1="14" y1="32" x2="276" y2="32" stroke="#fed7aa"/>
      <g font-size="10" fill="#334155">
        <rect x="14" y="42" width="124" height="28" rx="6" fill="#ffffff" stroke="#94a3b8"/>
        <text x="76" y="60" text-anchor="middle" font-size="10" font-weight="600">R1 — owns half</text>
        <rect x="148" y="42" width="124" height="28" rx="6" fill="#ffffff" stroke="#94a3b8"/>
        <text x="210" y="60" text-anchor="middle" font-size="10" font-weight="600">R2 — owns half</text>
      </g>
    </g>

    <!-- analytics group -->
    <g transform="translate(0, 260)">
      <rect width="290" height="60" rx="10" fill="#f8fafc" stroke="#0369a1" stroke-width="1.5"/>
      <text x="14" y="22" font-size="12" font-weight="600" fill="#0369a1">cms.agents.analytics</text>
      <text x="276" y="22" text-anchor="end" font-size="10" fill="#0369a1" font-style="italic">consumes batch</text>
      <line x1="14" y1="32" x2="276" y2="32" stroke="#bae6fd"/>
      <rect x="14" y="40" width="262" height="14" rx="4" fill="#ffffff" stroke="#94a3b8"/>
      <text x="145" y="51" text-anchor="middle" font-size="9" fill="#334155">R1 — single replica owns all batch partitions</text>
    </g>
  </g>

  <!-- Arrows: topics → consumer groups -->
  <!-- fast → triage -->
  <line x1="870" y1="172" x2="910" y2="180" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow-fast)"/>
  <!-- fast → compliance (dashed: secondary consumer group on same topic) -->
  <path d="M 870 172 Q 890 230 910 285" stroke="#10b981" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-fast)"/>
  <!-- batch → compliance -->
  <line x1="870" y1="272" x2="910" y2="295" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrow-batch)"/>
  <!-- batch → analytics -->
  <path d="M 870 272 Q 890 320 910 385" stroke="#f97316" stroke-width="1.8" fill="none" marker-end="url(#arrow-batch)"/>

  <!-- Feedback arrow: consumer groups → cms.feedback.v1 (write back) -->
  <path d="M 1055 425 C 1055 510, 880 510, 880 414" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-feedback)"/>
  <text x="965" y="460" text-anchor="middle" font-size="10" fill="#0369a1" font-style="italic">routing_feedback verdicts</text>

  <!-- Bandit reads feedback (arrow only; topic header already labels it) -->
  <path d="M 310 372 Q 250 372 230 290" stroke="#0ea5e9" stroke-width="1.2" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-feedback)"/>

  <!-- Design notes -->
  <g transform="translate(20, 545)">
    <rect x="0" y="0" width="1160" height="240" rx="10" fill="#fefefe" stroke="#e2e8f0" stroke-width="1"/>
    <text x="16" y="24" font-size="13" font-weight="600" fill="#0f172a">Design notes</text>

    <g font-size="11.5" fill="#334155">
      <text x="16" y="52"><tspan font-weight="600" fill="#065f46">① Per-entity ordering preserved.</tspan> All events for the same partition key (e.g. <tspan font-family="monospace">customer:42</tspan>) hash to the same partition; one replica in each consumer group owns that partition; per-entity ordering follows automatically.</text>
      <text x="16" y="76"><tspan font-weight="600" fill="#9a3412">② Independent fan-out per role.</tspan> Each agent role has its own consumer group with an independent offset cursor. <tspan font-family="monospace">cms.agents.triage</tspan> and <tspan font-family="monospace">cms.agents.compliance</tspan> both see every fast-lane event and process them independently.</text>
      <text x="16" y="100"><tspan font-weight="600" fill="#0369a1">③ Cooperative-sticky rebalances.</tspan> Replicas join or leave a group without stop-the-world rebalances (Kafka ≥ 2.4); per-key ordering survives membership changes.</text>
      <text x="16" y="124"><tspan font-weight="600" fill="#6b21a8">④ Idempotency contract.</tspan> The CloudEvent <tspan font-family="monospace">(source, id)</tspan> pair is the dedupe key. The CMS publishes at-least-once; the agent SDK dedupes before invoking the LLM.</text>
      <text x="16" y="148"><tspan font-weight="600" fill="#475569">⑤ Per-role DLQ.</tspan> Envelopes that fail N retries are written to <tspan font-family="monospace">&lt;group&gt;.dlq</tspan> for human triage. Replays are an explicit operator decision, not automatic.</text>
      <text x="16" y="172"><tspan font-weight="600" fill="#0f172a">⑥ Stateless agents.</tspan> The (event, context) envelope is the agent's entire input. Memory lives in the Context Engine (Graphiti); agents do not hold state across events and do not call back for additional context.</text>
      <text x="16" y="196"><tspan font-weight="600" fill="#0369a1">⑦ Feedback closes the bandit loop.</tspan> Agents write a verdict (<tspan font-family="monospace">appropriate / too_urgent / too_slow / irrelevant</tspan>) to <tspan font-family="monospace">cms.feedback.v1</tspan>; the RQ2 bandit consumes it asynchronously to update its policy. No second connection back to the engine.</text>
      <text x="16" y="222"><tspan font-weight="600" fill="#334155">⑧ Runtime is the developer's choice.</tspan> Replicas can be long-lived async consumers, Lambda-style ephemeral spawns (one invocation per event via Kafka source mapping), Knative, Modal, etc. — the CMS does not dictate.</text>
    </g>
  </g>
</svg>
