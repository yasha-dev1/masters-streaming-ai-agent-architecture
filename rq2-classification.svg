<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 1240 700" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#eab308"/>
    </marker>
    <marker id="arrow-theta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Background (forces light theme regardless of GitHub dark mode) -->
  <rect x="-20" y="-20" width="1240" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Event Classification — per-entity anomaly detection</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#64748b">Rules are the hard floor · per-entity baselines score deviation · OR-gate + guards decide · verdicts tune sensitivity (no labels)</text>

  <!-- Event -->
  <circle cx="50" cy="170" r="28" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="50" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">event</text>

  <!-- Stage 1: Envelope -->
  <g transform="translate(110, 120)">
    <rect width="160" height="100" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">1. Envelope</text>
    <line x1="20" y1="38" x2="140" y2="38" stroke="#c7d2fe"/>
    <text x="80" y="58" text-anchor="middle" font-size="11" fill="#475569">CloudEvents + adapter</text>
    <text x="80" y="75" text-anchor="middle" font-size="11" fill="#475569">Layer A (envelope) +</text>
    <text x="80" y="92" text-anchor="middle" font-size="11" fill="#475569">Layer B (per-source)</text>
  </g>

  <!-- Stage 2: Rules -->
  <g transform="translate(300, 120)">
    <rect width="150" height="100" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
    <text x="75" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">2. Rules — hard floor</text>
    <line x1="20" y1="38" x2="130" y2="38" stroke="#fde68a"/>
    <text x="75" y="58" text-anchor="middle" font-size="11" fill="#475569">JsonLogic / Drools</text>
    <text x="75" y="75" text-anchor="middle" font-size="11" fill="#475569">JIRA P0 · @oncall</text>
    <text x="75" y="92" text-anchor="middle" font-size="11" fill="#475569">urgent-but-expected</text>
  </g>

  <!-- Stage 3: Per-entity anomaly scorer -->
  <g transform="translate(490, 120)">
    <rect width="210" height="100" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="105" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">3. Per-entity anomaly scorer</text>
    <line x1="20" y1="38" x2="190" y2="38" stroke="#e9d5ff"/>
    <text x="105" y="58" text-anchor="middle" font-size="11" fill="#475569">HBOS + robust-z / Page-Hinkley</text>
    <text x="105" y="75" text-anchor="middle" font-size="11" fill="#475569">baseline keyed by subject</text>
    <text x="105" y="92" text-anchor="middle" font-size="11" fill="#475569">Flink keyed state + Graphiti</text>
  </g>

  <!-- Stage 4: OR-gate + guards -->
  <g transform="translate(730, 120)">
    <rect width="150" height="100" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
    <text x="75" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">4. OR-gate + guards</text>
    <line x1="20" y1="38" x2="130" y2="38" stroke="#fbcfe8"/>
    <text x="75" y="57" text-anchor="middle" font-size="11" fill="#475569">s_anom &gt; θ_source ?</text>
    <text x="75" y="74" text-anchor="middle" font-size="10.5" fill="#475569">abs-floor + multi-window</text>
    <text x="75" y="91" text-anchor="middle" font-size="10.5" fill="#475569">(short AND long cross)</text>
  </g>

  <!-- Action queues -->
  <g transform="translate(910, 90)">
    <rect width="160" height="180" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <text x="80" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Action</text>
    <g font-size="11">
      <rect x="12" y="40" width="136" height="40" rx="6" fill="#ecfdf5" stroke="#10b981"/>
      <text x="80" y="56" text-anchor="middle" fill="#065f46">fast — point anomaly</text>
      <text x="80" y="71" text-anchor="middle" fill="#065f46">or situation envelope</text>
      <rect x="12" y="88" width="136" height="28" rx="6" fill="#fff7ed" stroke="#f97316"/>
      <text x="80" y="106" text-anchor="middle" fill="#9a3412">batch — Context Unit</text>
      <text x="80" y="140" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">score also ranks salience</text>
      <text x="80" y="154" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">inside the batch lane</text>
    </g>
  </g>

  <!-- Main-flow arrows -->
  <line x1="78" y1="170" x2="110" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="170" x2="300" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="170" x2="490" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="160" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">no rule match</text>
  <line x1="700" y1="170" x2="730" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="170" x2="910" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rules floor arc → forces FAST -->
  <path d="M 375 120 C 375 48, 990 48, 990 90" stroke="#eab308" stroke-width="1.8" fill="none" marker-end="url(#arrow-skip)"/>
  <text x="680" y="40" text-anchor="middle" font-size="10.5" fill="#854d0e" font-style="italic">rule match → force FAST (detector alone would miss it)</text>

  <!-- Agent feedback box -->
  <g transform="translate(730, 360)">
    <rect width="180" height="80" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
    <text x="90" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Agent feedback (verdict)</text>
    <line x1="20" y1="38" x2="160" y2="38" stroke="#cbd5e1"/>
    <text x="90" y="57" text-anchor="middle" font-size="10.5" fill="#475569">appropriate · too_urgent</text>
    <text x="90" y="73" text-anchor="middle" font-size="10.5" fill="#475569">too_slow · irrelevant</text>
  </g>

  <!-- θ controller box -->
  <g transform="translate(490, 360)">
    <rect width="200" height="80" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="100" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">θ_source controller</text>
    <line x1="20" y1="38" x2="180" y2="38" stroke="#bae6fd"/>
    <text x="100" y="57" text-anchor="middle" font-size="10.5" fill="#475569">per-source EWMA / PID</text>
    <text x="100" y="73" text-anchor="middle" font-size="10.5" fill="#475569">too_urgent ↑θ · too_slow ↓θ</text>
  </g>

  <!-- Action → feedback -->
  <path d="M 990 270 Q 990 330 910 395" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="985" y="330" font-size="10" fill="#64748b" font-style="italic">agent acts + reports</text>

  <!-- feedback → controller -->
  <line x1="730" y1="400" x2="690" y2="400" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- controller → stage 4 (adjust θ, sensitivity) -->
  <path d="M 590 360 C 590 300, 805 300, 805 220" stroke="#0ea5e9" stroke-width="1.8" fill="none" marker-end="url(#arrow-theta)"/>
  <text x="700" y="295" text-anchor="middle" font-size="10.5" fill="#0369a1" font-weight="600">adjusts θ (sensitivity)</text>

  <!-- baseline self-update annotation -->
  <text x="595" y="240" text-anchor="middle" font-size="10" fill="#7e22ce" font-style="italic">baselines self-update from the stream — no retrain, no labels</text>

  <!-- Design notes -->
  <g transform="translate(20, 490)">
    <rect width="1160" height="170" rx="10" fill="#fefefe" stroke="#e2e8f0"/>
    <text x="16" y="26" font-size="13" font-weight="600" fill="#0f172a">Why per-entity anomaly detection (and why the old supervised classifier did not scale)</text>

    <g font-size="11.5" fill="#334155">
      <text x="16" y="52"><tspan font-weight="600" fill="#7e22ce">Partition-native.</tspan> Baselines are keyed by the CloudEvent <tspan font-family="monospace">subject</tspan> = the Kafka partition key / Flink <tspan font-family="monospace">keyBy</tspan>, so anomaly state shards along the axis the system already scales on. No global model, no central bottleneck, no label pipeline.</text>
      <text x="16" y="74"><tspan font-weight="600" fill="#6b21a8">Scorer.</tspan> HBOS (linear-time, mixed categorical+numeric, <tspan font-style="italic">no per-entity covariance matrix</tspan> — Cloudflare runs it over 310M entities) + robust-z / Page-Hinkley for point/local deviations HBOS misses. PCA+Mahalanobis is a per-source upgrade where features correlate.</text>
      <text x="16" y="96"><tspan font-weight="600" fill="#854d0e">Hybrid — anomaly ≠ urgency.</tspan> <tspan font-family="monospace">route_to_fast = Rules(e) OR (s_anom &gt; θ_source)</tspan>. Rules are the hard floor for urgent-but-expected (P0, @oncall); the scorer catches urgent-because-deviant. Each term covers the other's blind spot.</text>
      <text x="16" y="118"><tspan font-weight="600" fill="#9d174d">Guards.</tspan> Absolute-volume floor + multi-window confirmation (a short 5-min AND a long 1–4 h window must both cross — Google SRE multi-burn-rate) suppress trivial-novelty false alarms. A window anomaly emits one deduped situation envelope, not 500 raw events.</text>
      <text x="16" y="140"><tspan font-weight="600" fill="#0369a1">Feedback tunes sensitivity, not a model.</tspan> Verdicts nudge the per-source threshold θ_source (Cloudflare-style sensitivity levels) — a well-posed 1-D control problem — instead of supplying labels that do not exist.</text>
      <text x="16" y="162"><tspan font-weight="600" fill="#475569">Feature rule.</tspan> Baseline volume-decoupled ratios/compositions (event-type mix, actor entropy), not raw counts — so a legitimate spike (Black Friday, viral thread) doesn't false-positive. Cadence: 5-min buckets, ~4-week window, daily refresh.</text>
    </g>
  </g>
</svg>
