<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 1240 580" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-skip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#eab308"/>
    </marker>
  </defs>

  <!-- Background (forces light theme regardless of GitHub dark mode) -->
  <rect x="-20" y="-20" width="1240" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#0f172a">Event Classification — per-entity anomaly detection (HBOS)</text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#64748b">Rules are the hard floor · one HBOS model on per-entity-normalized features · OR-gate + guards decide · no feedback loop, no context store</text>

  <!-- Rules floor arc → forces FAST (drawn first so boxes sit on top) -->
  <path d="M 375 140 C 375 92, 990 92, 990 110" stroke="#eab308" stroke-width="1.8" fill="none" marker-end="url(#arrow-skip)"/>
  <text x="683" y="84" text-anchor="middle" font-size="10.5" fill="#854d0e" font-style="italic">rule match → straight to FAST</text>

  <!-- Event -->
  <circle cx="50" cy="190" r="28" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="50" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">event</text>

  <!-- Stage 1: Envelope -->
  <g transform="translate(110, 140)">
    <rect width="160" height="100" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">1. Envelope</text>
    <line x1="22" y1="40" x2="138" y2="40" stroke="#c7d2fe"/>
    <text x="80" y="60" text-anchor="middle" font-size="11" fill="#475569">CloudEvents + adapter</text>
    <text x="80" y="77" text-anchor="middle" font-size="11" fill="#475569">Layer A (envelope) +</text>
    <text x="80" y="92" text-anchor="middle" font-size="11" fill="#475569">Layer B (per-source)</text>
  </g>

  <!-- Stage 2: Rules -->
  <g transform="translate(300, 140)">
    <rect width="150" height="100" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
    <text x="75" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">2. Rules — floor</text>
    <line x1="20" y1="40" x2="130" y2="40" stroke="#fde68a"/>
    <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">JsonLogic / Drools</text>
    <text x="75" y="77" text-anchor="middle" font-size="11" fill="#475569">JIRA P0 · @oncall</text>
    <text x="75" y="92" text-anchor="middle" font-size="11" fill="#475569">urgent-but-expected</text>
  </g>

  <!-- Stage 3: HBOS scorer -->
  <g transform="translate(490, 140)">
    <rect width="210" height="100" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
    <text x="105" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">3. HBOS scorer</text>
    <line x1="24" y1="40" x2="186" y2="40" stroke="#e9d5ff"/>
    <text x="105" y="60" text-anchor="middle" font-size="11" fill="#475569">per-entity normalize (robust-z)</text>
    <text x="105" y="77" text-anchor="middle" font-size="11" fill="#475569">→ HBOS = Σ log 1/hist(p)</text>
    <text x="105" y="92" text-anchor="middle" font-size="11" fill="#475569">keyed by subject</text>
  </g>

  <!-- Stage 4: OR-gate + guards -->
  <g transform="translate(730, 140)">
    <rect width="150" height="100" rx="10" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.5"/>
    <text x="75" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">4. OR-gate</text>
    <line x1="20" y1="40" x2="130" y2="40" stroke="#fbcfe8"/>
    <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">s_anom &gt; θ_source ?</text>
    <text x="75" y="77" text-anchor="middle" font-size="10.5" fill="#475569">abs-floor + multi-window</text>
    <text x="75" y="92" text-anchor="middle" font-size="10.5" fill="#475569">(short AND long cross)</text>
  </g>

  <!-- Action queues -->
  <g transform="translate(910, 110)">
    <rect width="160" height="180" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <text x="80" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Action</text>
    <line x1="20" y1="38" x2="140" y2="38" stroke="#e2e8f0"/>
    <rect x="14" y="48" width="132" height="42" rx="6" fill="#ecfdf5" stroke="#10b981"/>
    <text x="80" y="65" text-anchor="middle" font-size="11" fill="#065f46">fast — point anomaly</text>
    <text x="80" y="80" text-anchor="middle" font-size="11" fill="#065f46">or situation envelope</text>
    <rect x="14" y="98" width="132" height="28" rx="6" fill="#fff7ed" stroke="#f97316"/>
    <text x="80" y="116" text-anchor="middle" font-size="11" fill="#9a3412">batch — Context Unit</text>
    <text x="80" y="148" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">score also ranks</text>
    <text x="80" y="162" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">salience in batch lane</text>
  </g>

  <!-- Main-flow arrows -->
  <line x1="78" y1="190" x2="110" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="190" x2="300" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="190" x2="490" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="182" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">no match</text>
  <line x1="700" y1="190" x2="730" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="190" x2="910" y2="190" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Short annotations under stages 3 and 4 -->
  <text x="595" y="262" text-anchor="middle" font-size="10.5" fill="#7e22ce" font-style="italic">plain keyed state · no context store</text>
  <text x="805" y="262" text-anchor="middle" font-size="10.5" fill="#9d174d" font-style="italic">static θ · no feedback loop</text>

  <!-- Design notes -->
  <g transform="translate(20, 295)">
    <rect width="1160" height="230" rx="10" fill="#fefefe" stroke="#e2e8f0"/>
    <text x="20" y="28" font-size="13" font-weight="600" fill="#0f172a">Why this design (simplified): one model · no loop · no context store on the routing path</text>

    <g font-size="11" fill="#334155">
      <text x="20" y="56"><tspan font-weight="600" fill="#7e22ce">One scorer — HBOS</tspan> over per-entity-normalized features (robust-z is the normalizer, not a 2nd detector). No covariance matrix → scales to millions of entities.</text>
      <text x="20" y="82"><tspan font-weight="600" fill="#9d174d">No feedback loop.</tspan> θ_source is a static per-source sensitivity (or self-calibrating score quantile), like Cloudflare — deleting the cms.feedback.v1 control path and controller.</text>
      <text x="20" y="108"><tspan font-weight="600" fill="#475569">No context store on the routing path.</tspan> The decision reads only plain per-entity keyed state; the bitemporal graph + RAG store is read-side context memory (RQ5) the router never touches.</text>
      <text x="20" y="134"><tspan font-weight="600" fill="#854d0e">Anomaly ≠ urgency.</tspan> <tspan font-family="monospace">route_to_fast = Rules(e) OR (s_anom &gt; θ_source)</tspan> — rules cover urgent-but-expected (P0); the scorer covers urgent-because-deviant.</text>
      <text x="20" y="160"><tspan font-weight="600" fill="#0369a1">Guards.</tspan> Absolute-volume floor + multi-window confirmation (short AND long must cross) suppress trivial novelty; a window anomaly emits one deduped situation envelope.</text>
      <text x="20" y="186"><tspan font-weight="600" fill="#6b21a8">Partition-native scale.</tspan> Per-entity state is keyed by subject = the Kafka partition key / Flink keyBy — sharding on the axis the system already scales on.</text>
    </g>
  </g>
</svg>
